<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Create Invoice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Create Invoice</h1>
  <form id="invoiceForm">
    <input name="customerName" placeholder="Customer name" required />
    <textarea name="customerAddress" placeholder="Address"></textarea>
    <input name="customerPhone" placeholder="Phone" />
    <div id="items"></div>
    <button id="addItemBtn" type="button">Add item</button>
    <input name="taxPercent" type="number" placeholder="Tax %" value="0" />
    <input name="total" placeholder="Total" readonly />
    <button id="saveDraft" type="button">Save Draft</button>
    <button id="finalize" type="button">Finalize & Download</button>
  </form>
  <p><a href="/history.html">View Invoice History</a></p>
  <script src="script.js"></script>
</body>
</html>
